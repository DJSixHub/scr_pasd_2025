version: '3'

services:
  # Head node service
  head:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: --mode=train --head
    ports:
      - "6379:6379"  # Redis port for Ray
      - "8265:8265"  # Ray dashboard
      - "8000:8000"  # Model serving API
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../plots:/app/plots
    environment:
      - RAY_ADDRESS=

  # Worker node service (can be scaled)
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: --mode=train --worker --head-address=head:6379
    depends_on:
      - head
    volumes:
      - ../data:/app/data
    environment:
      - RAY_ADDRESS=head:6379
    deploy:
      replicas: 2  # Number of worker nodes

  # Serving API service
  serving:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: --mode=serve
    ports:
      - "8000:8000"
    depends_on:
      - head
    volumes:
      - ../models:/app/models
    environment:
      - RAY_ADDRESS=head:6379

  # Monitoring service
  monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: --mode=monitor
    depends_on:
      - head
    volumes:
      - ../plots:/app/plots
    environment:
      - RAY_ADDRESS=head:6379
