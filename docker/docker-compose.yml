version: '3'

services:
  # Servicio de nodo principal
  head:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: --mode=train --head
    ports:
      - "6379:6379"  # Puerto Redis para Ray
      - "8265:8265"  # Dashboard de Ray
      - "8000:8000"  # API de servicio de modelos
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../plots:/app/plots
    environment:
      - RAY_ADDRESS=
  # Servicio de nodo trabajador (escalable)
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: --mode=train --worker --head-address=head:6379
    depends_on:
      - head
    volumes:
      - ../data:/app/data
    environment:
      - RAY_ADDRESS=head:6379
    deploy:
      replicas: 2  # Número de nodos trabajadores

  # Servicio API para servir modelos
  serving:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: --mode=serve
    ports:
      - "8000:8000"
    depends_on:
      - head
    volumes:
      - ../models:/app/models
    environment:
      - RAY_ADDRESS=head:6379

  # Monitoring service
  monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: --mode=monitor
    depends_on:
      - head
    volumes:
      - ../plots:/app/plots
    environment:
      - RAY_ADDRESS=head:6379
